services:
  - type: web
    name: skylark-backend
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skylark-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false # You will set this in the Render dashboard after launch
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant

databases:
  - name: skylark-db
    plan: free
    databaseName: ridgeway
